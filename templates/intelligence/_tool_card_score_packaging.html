<div class="border border-stone-200 rounded-lg p-4 bg-white">
  <h3 class="text-base font-semibold text-stone-900">Score packaging</h3>
  <p class="text-xs text-stone-500 mb-3">Title + thumbnail CTR prediction. 1 credit.</p>
  <form hx-post="{% url 'intelligence:score-packaging' org_id=organization.id %}"
        hx-target="#score-packaging-result"
        hx-swap="outerHTML"
        class="space-y-2">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Video title"
           class="w-full px-3 py-2 border border-stone-300 rounded text-sm">
    <input type="url" name="thumbnail_url" placeholder="Thumbnail URL (optional)"
           class="w-full px-3 py-2 border border-stone-300 rounded text-sm">
    <button type="submit"
            class="px-4 py-1.5 text-sm font-semibold text-white bg-orange-600 rounded-full hover:bg-orange-700">
      Score
    </button>
  </form>
  <div id="score-packaging-result" class="mt-3"></div>
</div>
