<div class="border border-stone-200 rounded-lg p-4 bg-white">
  <h3 class="text-base font-semibold text-stone-900">Research content gaps</h3>
  <p class="text-xs text-stone-500 mb-3">Ranked opportunities in a niche. 5 credits.</p>
  <form hx-post="{% url 'intelligence:research-content-gaps' org_id=organization.id %}"
        hx-target="#research-content-gaps-result"
        hx-swap="outerHTML"
        class="space-y-2">
    {% csrf_token %}
    <input type="text" name="niche" required placeholder="Niche slug (e.g. ai_dev_tools)"
           class="w-full px-3 py-2 border border-stone-300 rounded text-sm">
    <button type="submit"
            class="px-4 py-1.5 text-sm font-semibold text-white bg-orange-600 rounded-full hover:bg-orange-700">
      Research
    </button>
  </form>
  <div id="research-content-gaps-result" class="mt-3"></div>
</div>
