<div id="score-packaging-result" class="mt-3 p-3 rounded border border-stone-200 bg-stone-50">
  <div class="flex items-center justify-between">
    <div>
      <div class="text-xs text-stone-500">Score</div>
      <div class="text-2xl font-bold text-stone-900">{{ result.score|floatformat:2 }}</div>
    </div>
    <div class="text-right">
      <div class="text-xs text-stone-500">Percentile</div>
      <div class="text-lg font-semibold text-stone-900">{{ result.percentile }}</div>
    </div>
  </div>
  <div class="mt-2 text-xs text-stone-600">
    Niche: <span class="font-medium">{{ result.niche_label }}</span>
    <span class="text-stone-400">({{ result.niche_slug }})</span>
  </div>
</div>
