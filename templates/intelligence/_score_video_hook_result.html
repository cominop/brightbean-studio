<div id="score-video-hook-result" class="mt-3 p-3 rounded border border-stone-200 bg-stone-50">
  <div class="flex items-center justify-between">
    <div>
      <div class="text-xs text-stone-500">Overall</div>
      <div class="text-2xl font-bold text-stone-900">{{ result.overall_score }}</div>
    </div>
    <div class="text-right">
      <div class="text-xs text-stone-500">Archetype</div>
      <div class="text-sm font-semibold text-stone-900">{{ result.primary_archetype }}</div>
    </div>
  </div>
  {% if result.suggestions %}
    <div class="mt-3">
      <div class="text-xs font-semibold text-stone-700 mb-1">Suggestions</div>
      <ul class="text-xs text-stone-600 list-disc pl-4 space-y-1">
        {% for s in result.suggestions %}<li>{{ s }}</li>{% endfor %}
      </ul>
    </div>
  {% endif %}
</div>
