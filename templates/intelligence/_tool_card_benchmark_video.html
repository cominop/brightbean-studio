<div class="border border-stone-200 rounded-lg p-4 bg-white">
  <h3 class="text-base font-semibold text-stone-900">Benchmark video</h3>
  <p class="text-xs text-stone-500 mb-3">Video vs niche peers. 3 credits.</p>
  <form hx-post="{% url 'intelligence:benchmark-video' org_id=organization.id %}"
        hx-target="#benchmark-video-result"
        hx-swap="outerHTML"
        class="space-y-2">
    {% csrf_token %}
    <input type="url" name="url" required placeholder="YouTube video URL"
           class="w-full px-3 py-2 border border-stone-300 rounded text-sm">
    <button type="submit"
            class="px-4 py-1.5 text-sm font-semibold text-white bg-orange-600 rounded-full hover:bg-orange-700">
      Benchmark
    </button>
  </form>
  <div id="benchmark-video-result" class="mt-3"></div>
</div>
