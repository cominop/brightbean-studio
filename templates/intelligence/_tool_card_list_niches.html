<div class="border border-stone-200 rounded-lg p-4 bg-white">
  <h3 class="text-base font-semibold text-stone-900">List niches</h3>
  <p class="text-xs text-stone-500 mb-3">Available niche slugs. 1 credit.</p>
  <form hx-post="{% url 'intelligence:list-niches' org_id=organization.id %}"
        hx-target="#list-niches-result"
        hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
            class="px-4 py-1.5 text-sm font-semibold text-white bg-orange-600 rounded-full hover:bg-orange-700">
      List niches
    </button>
  </form>
  <div id="list-niches-result" class="mt-3"></div>
</div>
